<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalkCards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 48px 32px;
      background: white;
      border-radius: 20px;
      border: 1px solid #e8e8e8;
      max-width: 400px;
      width: 100%;
      margin: 24px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #5FBB56;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      margin: 0 auto 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      margin-bottom: 28px;
      font-size: 16px;
      line-height: 1.5;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    a {
      display: block;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
    }
    .primary {
      background: #5FBB56;
      color: white;
    }
    .secondary {
      background: #f0f0f0;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🗣️</div>
    <h1>TalkCards</h1>
    <p>Speech practice app for children with expressive speech delay.</p>
    <div class="links">
      <a class="primary" href="https://apps.apple.com/app/talkcards/id000000000">Download on the App Store</a>
      <a class="secondary" href="privacy.html">Privacy Policy</a>
      <a class="secondary" href="mailto:feedback@talkcards.app">Support</a>
    </div>
  </div>
</body>
</html>
