<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalkCards</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="home">
  <main class="card" aria-labelledby="app-title">
    <div class="language-switch" aria-label="Language selector"></div>

    <img
      class="app-icon"
      src="pan_da.png"
      alt="TalkCards app icon"
      width="128"
      height="128"
    />

    <p id="tagline"></p>
    <p id="origin"></p>

    <nav class="links" aria-label="Main links">
      <a class="primary" id="download-link" href="https://apps.apple.com/app/id6761809094">Download on the App Store</a>
      <a class="secondary" data-page-link="privacy" href="page.html?p=privacy">Privacy Policy</a>
      <a class="secondary" data-page-link="terms" href="page.html?p=terms">Terms & Conditions</a>
      <a class="secondary" data-page-link="faq" href="page.html?p=faq">FAQ & Support</a>
    </nav>
  </main>

  <script>
    const LOCALES = {
      en: {
        tag: 'Parent-guided speech support at home. One daily recommendation, coaching tips, therapist reports. 6 languages, no ads, works offline.',
        origin: 'Built by a parent of a child with speech delay, inspired by real home-practice activities from speech therapy.',
        download: 'Download on the App Store',
        privacy: 'Privacy Policy',
        terms: 'Terms & Conditions',
        faq: 'FAQ & Support',
        language: 'Language',
      },
      es: {
        tag: 'Práctica diaria de logopedia en casa. La app recomienda qué practicar cada día. Reportes para tu fonoaudiólogo. 6 idiomas, sin anuncios, funciona sin conexión.',
        origin: 'Creada por un padre de un niño con retraso en el habla, inspirado en actividades reales de práctica en el hogar de la terapia del habla.',
        download: 'Descargar en App Store',
        privacy: 'Política de privacidad',
        terms: 'Términos y condiciones',
        faq: 'Preguntas frecuentes',
        language: 'Idioma',
      },
      pt: {
        tag: 'Prática fonoaudiológica diária em casa. O app recomenda o que praticar cada dia. Relatórios para o fonoaudiólogo. 6 idiomas, sem anúncios, funciona offline.',
        origin: 'Criado por um pai de uma criança com atraso na fala, inspirado em atividades reais de prática em casa da terapia de fala.',
        download: 'Descarregar na App Store',
        privacy: 'Política de privacidade',
        terms: 'Termos e condições',
        faq: 'Perguntas frequentes',
        language: 'Idioma',
      },
      fr: {
        tag: 'Pratique orthophonique quotidienne à la maison. L\'app recommande quoi pratiquer chaque jour. Rapports pour le logopède. 6 langues, sans pub, fonctionne hors ligne.',
        origin: 'Créée par un parent d\'un enfant ayant un retard de la parole, inspirée par des activités réelles de pratique à la maison de l\'orthophonie.',
        download: 'Télécharger sur l\'App Store',
        privacy: 'Politique de confidentialité',
        terms: 'Conditions générales',
        faq: 'FAQ',
        language: 'Langue',
      },
      de: {
        tag: 'Tägliche Sprachtherapie zu Hause. Die App empfiehlt täglich, was zu üben ist. Berichte für Logopäden. 6 Sprachen, keine Werbung, funktioniert offline.',
        origin: 'Entwickelt von einem Elternteil eines Kindes mit Sprachverzögerung, inspiriert von echten häuslichen Übungsaktivitäten aus der Sprachtherapie.',
        download: 'Im App Store laden',
        privacy: 'Datenschutzerklärung',
        terms: 'Allgemeine Geschäftsbedingungen',
        faq: 'FAQ',
        language: 'Sprache',
      },
      cs: {
        tag: 'Denní logopedická cvičení doma. Aplikace každý den doporučuje co procvičovat. Reporty pro logopeda. 6 jazyků, bez reklam, funguje offline.',
        origin: 'Vytvořeno rodiči dítěte s vývojovou dysfázií, inspirováno skutečnými domácími cvičeními z logopedie.',
        download: 'Stáhnout v App Storu',
        privacy: 'Zásady ochrany soukromí',
        terms: 'Obchodní podmínky',
        faq: 'Časté otázky',
        language: 'Jazyk',
      },
    };

    const SUPPORTED_LANGS = ['en', 'es', 'pt', 'fr', 'de', 'cs'];
    const LANGUAGE_LABELS = {
      en: 'ENG',
      es: 'SP',
      pt: 'PT',
      fr: 'FR',
      de: 'GER',
      cs: 'CZ',
    };

    const DEFAULT_LANG = 'en';
    const params = new URLSearchParams(location.search);
    const detectedLang = (navigator.language || DEFAULT_LANG).slice(0, 2).toLowerCase();
    const initialLang = params.get('lang') || localStorage.getItem('panda_lang') || detectedLang;

    let lang = SUPPORTED_LANGS.includes(initialLang) ? initialLang : DEFAULT_LANG;

    function setLang(nextLang) {
      lang = SUPPORTED_LANGS.includes(nextLang) ? nextLang : DEFAULT_LANG;

      localStorage.setItem('panda_lang', lang);
      document.documentElement.lang = lang;

      const t = LOCALES[lang];

      document.getElementById('tagline').textContent = t.tag;
      document.getElementById('origin').textContent = t.origin;
      document.getElementById('download-link').textContent = t.download;
      document.querySelector('[data-page-link="privacy"]').textContent = t.privacy;
      document.querySelector('[data-page-link="terms"]').textContent = t.terms;
      document.querySelector('[data-page-link="faq"]').textContent = t.faq;

      document.querySelectorAll('[data-page-link]').forEach(link => {
        link.href = `page.html?p=${link.dataset.pageLink}&lang=${lang}`;
      });

      history.replaceState(null, '', `?lang=${lang}`);
      renderLanguageSwitch();
    }

    function renderLanguageSwitch() {
      document.querySelector('.language-switch').innerHTML = SUPPORTED_LANGS.map(code =>
        `<button type="button" class="${code === lang ? 'active' : ''}" data-lang="${code}">${LANGUAGE_LABELS[code]}</button>`
      ).join('');

      document.querySelectorAll('[data-lang]').forEach(btn => {
        btn.addEventListener('click', () => setLang(btn.dataset.lang));
      });
    }

    setLang(lang);
  </script>
</body>
</html>
